<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Instrument Currency (61.57(c))</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b1b33;
      color: #f5f5f5;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .panel {
      background: #122445;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 1100px;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 14px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: #1f6feb;
      color: #fff;
    }

    .log-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* SIM LAYOUT */
    .sim-container {
      position: relative;
      width: 100%;
      max-width: 1100px;
      margin-top: 20px;
    }

    /* PILOT */
    .pilot-wrapper {
      position: absolute;
      left: 0;
      top: 0;
      width: 200px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pilot-img {
      width: 160px;
      height: auto;
      margin-bottom: 10px;
    }

    /* THOUGHT BUBBLE ABOVE PILOT */
    .thought-bubble {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      background: #f9fafb;
      color: #111827;
      border-radius: 16px;
      padding: 10px 12px;
      max-width: 260px;
      font-size: 0.9rem;
      z-index: 5;
    }

    .thought-bubble::before {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 40px;
      width: 16px;
      height: 16px;
      background: #f9fafb;
      border-radius: 50%;
    }

    .thought-bubble::after {
      content: "";
      position: absolute;
      bottom: -20px;
      left: 30px;
      width: 10px;
      height: 10px;
      background: #f9fafb;
      border-radius: 50%;
    }

    .thought-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .thought-list {
      margin: 0;
      padding-left: 16px;
    }

    /* FACTORY AREA */
    .factory-area {
      margin-left: 220px;
      background: #0a162b;
      border-radius: 10px;
      padding: 16px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      min-height: 260px;
    }

    .chute {
      position: absolute;
      left: 0;
      top: 40px;
      width: 80px;
      height: 80px;
      background: #1f2937;
      border-radius: 10px;
      border: 3px solid #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      font-weight: 700;
      font-size: 0.8rem;
      z-index: 3;
    }

    .belt {
      position: relative;
      height: 60px;
      background: #111827;
      border-radius: 16px;
      margin-left: 120px;
      margin-right: 40px;
      overflow: hidden;
      border: 3px solid #020617;
      box-shadow: 0 4px 0 #020617;
    }

    .belt-rollers {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 16px;
      transform: translateY(-50%);
      display: flex;
      gap: 8px;
      padding: 0 8px;
    }

    .roller {
      flex: 0 0 20px;
      height: 16px;
      background: #374151;
      border-radius: 999px;
      box-shadow: inset 0 0 4px rgba(0,0,0,0.7);
    }

    .belt-label {
      text-align: center;
      margin-top: 4px;
      font-size: 0.85rem;
      color: #e5e7eb;
      font-weight: 600;
    }

    /* STACKED BELTS */
    .belt1-wrapper {
      margin-top: 40px;
    }

    .belt2-wrapper {
      margin-top: 10px;
    }

    .belt-step {
      position: absolute;
      left: 120px;
      top: 140px;
      width: 40px;
      height: 20px;
      background: #020617;
      border-radius: 0 0 10px 10px;
      z-index: 2;
    }

    /* BOXES */
    .boxes-layer {
      position: absolute;
      left: 120px;
      right: 40px;
      top: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 4;
    }

    .box {
      position: absolute;
      width: 70px;
      height: 40px;
      background: #fbbf24;
      border-radius: 6px;
      border: 3px solid #92400e;
      box-shadow: 0 4px 0 #78350f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      font-weight: 700;
      font-size: 0.75rem;
    }

    /* DUMPSTER */
    .dumpster {
      position: absolute;
      right: 0;
      bottom: 10px;
      width: 70px;
      height: 60px;
      background: #14532d;
      border-radius: 8px 8px 4px 4px;
      border: 3px solid #022c22;
      box-shadow: 0 4px 0 #022c22;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      color: #bbf7d0;
      font-size: 0.75rem;
      font-weight: 700;
      text-align: center;
      padding-bottom: 4px;
      z-index: 3;
    }

    /* IPC */
    .ipc-banner {
      position: absolute;
      inset: 0;
      background: rgba(127,29,29,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fee2e2;
      font-weight: 800;
      font-size: 2rem;
      text-align: center;
      z-index: 20;
    }

  </style>
</head>

<body>
  <h1>Instrument Currency (61.57(c))</h1>

  <div class="panel">
    <div class="top-controls">
      <button id="beginBtn">Begin</button>

      <div class="log-options">
        <label><input type="checkbox" name="item" value="Approach" /> Approach</label>
        <label><input type="checkbox" name="item" value="Hold" /> Hold</label>
        <label><input type="checkbox" name="item" value="Intercept" /> Intercept</label>
        <label><input type="checkbox" name="item" value="Track" /> Track</label>
        <button id="logBtn">Log</button>
      </div>
    </div>
  </div>

  <div class="sim-container">

    <!-- PILOT -->
    <div class="pilot-wrapper">
      <img src="pilot.png" class="pilot-img" />

      <div class="thought-bubble" id="thoughtBubble">
        <div class="thought-title">Instrument Currency</div>
        <ul class="thought-list" id="thoughtList">
          <li>I need 6 approaches</li>
          <li>I need 1 hold</li>
          <li>I need 1 intercept</li>
          <li>I need 1 track</li>
        </ul>
      </div>
    </div>

    <!-- FACTORY -->
    <div class="factory-area">

      <div class="chute">CHUTE</div>

      <div class="belt1-wrapper">
        <div class="belt" id="belt1">
          <div class="belt-rollers">
            <div class="roller"></div><div class="roller"></div><div class="roller"></div>
            <div class="roller"></div><div class="roller"></div><div class="roller"></div>
            <div class="roller"></div><div class="roller"></div><div class="roller"></div>
          </div>
        </div>
        <div class="belt-label">Current (0–6 months)</div>
      </div>

      <div class="belt-step"></div>

      <div class="belt2-wrapper">
        <div class="belt" id="belt2">
          <div class="belt-rollers">
            <div class="roller"></div><div class="roller"></div><div class="roller"></div>
            <div class="roller"></div><div class="roller"></div><div class="roller"></div>
            <div class="roller"></div><div class="roller"></div><div class="roller"></div>
          </div>
        </div>
        <div class="belt-label">Not Current, but there is still time (7–12 months)</div>
      </div>

      <div class="boxes-layer" id="boxesLayer"></div>

      <div class="dumpster">DUMPSTER</div>

      <div class="ipc-banner" id="ipcBanner" style="display:none;">
        <div>IPC REQUIRED</div>
        <button id="resetBtn">Reset</button>
      </div>

    </div>
  </div>

  <script>
    const MONTH_PIXELS = 50;
    const BELT1_END = 6;
    const BELT2_END = 12;
    const SPEED = 1/3;

    let simStarted = false;
    let beltsRunning = false;
    let lastTime = null;
    let ipc = false;

    let needs = {
      Approach: 6,
      Hold: 1,
      Intercept: 1,
      Track: 1
    };

    let boxes = [];

    const beginBtn = document.getElementById("beginBtn");
    const logBtn = document.getElementById("logBtn");
    const resetBtn = document.getElementById("resetBtn");
    const thoughtList = document.getElementById("thoughtList");
    const boxesLayer = document.getElementById("boxesLayer");
    const ipcBanner = document.getElementById("ipcBanner");

    const itemCheckboxes = document.querySelectorAll("input[name='item']");

    function updateThought() {
      thoughtList.innerHTML = "";

      const items = [];
      if (needs.Approach > 0) items.push(`I need ${needs.Approach} approach${needs.Approach>1?"es":""}`);
      if (needs.Hold > 0) items.push("I need 1 hold");
      if (needs.Intercept > 0) items.push("I need 1 intercept");
      if (needs.Track > 0) items.push("I need 1 track");

      if (items.length === 0) {
        const li = document.createElement("li");
        li.textContent = "I am current";
        thoughtList.appendChild(li);
      } else {
        items.forEach(t => {
          const li = document.createElement("li");
          li.textContent = t;
          thoughtList.appendChild(li);
        });
      }
    }

    function createBox(label) {
      const id = "box-" + Math.random().toString(16).slice(2);
      const div = document.createElement("div");
      div.className = "box";
      div.id = id;
      div.style.left = "0px";
      div.style.top = "20px";

      const span = document.createElement("div");
      span.textContent = label.toUpperCase();
      div.appendChild(span);

      boxesLayer.appendChild(div);

      boxes.push({
        id,
        label,
        month: 0,
        active: true
      });
    }

    function startBelts() {
      if (!beltsRunning && boxes.length > 0 && simStarted && !ipc) {
        beltsRunning = true;
        lastTime = null;
        requestAnimationFrame(tick);
      }
    }

    function stopBelts() {
      beltsRunning = false;
      lastTime = null;
    }

    function triggerIPC() {
      ipc = true;
      stopBelts();
      ipcBanner.style.display = "flex";
    }

    function resetSim() {
      ipc = false;
      simStarted = false;
      stopBelts();
      boxes.forEach(b => {
        const el = document.getElementById(b.id);
        if (el) el.remove();
      });
      boxes = [];
      needs = { Approach: 6, Hold: 1, Intercept: 1, Track: 1 };
      updateThought();
      ipcBanner.style.display = "none";
    }

    function updateBoxes(dt) {
      const dm = dt * SPEED;

      for (const box of boxes) {
        if (!box.active) continue;

        box.month += dm;

        const el = document.getElementById(box.id);
        if (!el) continue;

        if (box.month <= BELT1_END) {
          el.style.top = "20px";
        } else if (box.month <= BELT2_END) {
          el.style.top = "120px";
        } else {
          box.active = false;
          el.remove();
          if (!ipc) triggerIPC();
          continue;
        }

        el.style.left = (box.month * MONTH_PIXELS) + "px";
      }

      boxes = boxes.filter(b => b.active);
      if (boxes.length === 0) stopBelts();
    }

    function tick(t) {
      if (!beltsRunning || ipc) return;

      if (lastTime == null) {
        lastTime = t;
        requestAnimationFrame(tick);
        return;
      }

      const dt = (t - lastTime) / 1000;
      lastTime = t;

      updateBoxes(dt);
      requestAnimationFrame(tick);
    }

    beginBtn.addEventListener("click", () => {
      simStarted = true;
      startBelts();
    });

    logBtn.addEventListener("click", () => {
      if (!simStarted || ipc) return;

      const selected = Array.from(itemCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
      if (selected.length === 0) {
        alert("Select at least one item.");
        return;
      }

      selected.forEach(label => {
        if (label === "Approach" && needs.Approach > 0) needs.Approach--;
        if (label === "Hold" && needs.Hold > 0) needs.Hold--;
        if (label === "Intercept" && needs.Intercept > 0) needs.Intercept--;
        if (label === "Track" && needs.Track > 0) needs.Track--;

        createBox(label);
      });

      itemCheckboxes.forEach(cb => cb.checked = false);
      updateThought();
      startBelts();
    });

    resetBtn.addEventListener("click", resetSim);

    updateThought();
  </script>

</body>
</html>
