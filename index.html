<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instrument Currency (61.57(c))</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <div class="logo-title">
      <!-- Replace src with your actual logo file -->
      <img src="us-aviation-logo.png" alt="US Aviation Logo" class="logo">
      <h1>Instrument Currency (61.57(c))</h1>
    </div>
    <button id="beginButton" class="primary-btn">Begin</button>
  </header>

  <main class="sim-container">
    <section class="controls-panel">
      <div class="options-group">
        <label><input type="radio" name="eventType" value="Approach"> Approach</label>
        <label><input type="radio" name="eventType" value="Hold"> Hold</label>
        <label><input type="radio" name="eventType" value="Intercept"> Intercept</label>
        <label><input type="radio" name="eventType" value="Track"> Track</label>
      </div>
      <button id="logButton" class="secondary-btn">Log</button>
    </section>

    <section class="factory-scene">
      <div class="pilot-area">
        <!-- Replace src with your actual pilot PNG -->
        <img src="pilot.png" alt="Pilot" class="pilot-img">

        <div class="thought-bubble">
          <div id="thoughtText">
            I need 6 approaches, a hold, an intercept, and to track a navigation point in order to get current.
          </div>
        </div>

        <div class="chute">
          <div class="chute-label">Chute</div>
        </div>
      </div>

      <div class="belts-area">
        <!-- Belt 1: Current -->
        <div class="belt-wrapper belt1-wrapper">
          <div class="belt-label">Current</div>
          <div class="belt belt1" id="belt1">
            <div class="months">
              <span>Month 0</span>
              <span>1</span>
              <span>2</span>
              <span>3</span>
              <span>4</span>
              <span>5</span>
              <span>6</span>
            </div>
          </div>
        </div>

        <!-- Belt 2: Not current but still time -->
        <div class="belt-wrapper belt2-wrapper">
          <div class="belt-label">Not Current, but there is still time</div>
          <div class="belt belt2" id="belt2">
            <div class="months">
              <span>Month 6</span>
              <span>7</span>
              <span>8</span>
              <span>9</span>
              <span>10</span>
              <span>11</span>
              <span>12</span>
            </div>
          </div>
          <div class="dumpster">
            <div class="dumpster-body">Dumpster</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- IPC overlay -->
  <div id="ipcOverlay" class="ipc-overlay hidden">
    <div class="ipc-content">
      <h2>IPC Required</h2>
      <button id="resetButton" class="primary-btn">Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
