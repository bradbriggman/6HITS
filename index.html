<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>61.57(c) Belt Simulator</title>
  <style>
    /* ============================
       PAGE BASE
    ============================ */
    body {
      margin: 0;
      padding: 20px;
      background: #020617;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ============================
       SIMULATOR CONTAINER
    ============================ */
    .sim-container {
      position: relative;
      width: 100%;
      height: 600px;
      overflow: visible;
      border: 1px solid #1f2937;
      background: #0b1120;
    }

    /* ============================
       PILOT + THOUGHT BUBBLE
    ============================ */
    .pilot-wrapper {
      position: absolute;
      top: 60px;
      left: 0;
      width: 200px;
      z-index: 2; /* behind belts */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pilot {
      width: 160px;
      /* temp placeholder if no image */
      background: #1e293b;
      height: 200px;
    }

    .thought-bubble {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: #f9fafb;
      color: #020617;
      border-radius: 16px;
      padding: 10px 14px;
      max-width: 220px;
      font-size: 0.9rem;
      z-index: 5; /* above everything */
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.6);
    }

    .thought-bubble ul {
      margin: 0;
      padding-left: 18px;
    }

    /* ============================
       FACTORY AREA
    ============================ */
    .factory-area {
      position: relative;
      width: 100%;
      height: 500px;
      margin-top: 40px;
    }

    .chute {
      position: absolute;
      top: 80px;
      left: 40px;
      width: 80px;
      height: 80px;
      border: 2px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      text-align: center;
    }

    /* ============================
       BELT APPEARANCE
    ============================ */
    .belt {
      width: 350px;
      height: 40px;
      background: #d1d5db;
      border: 2px solid #9ca3af;
      position: relative;
      overflow: hidden;
      z-index: 3; /* belts above pilot */
    }

    .belt-rollers {
      display: flex;
      gap: 6px;
      padding: 6px;
    }

    .roller {
      width: 20px;
      height: 20px;
      background: #1e293b;
      border-radius: 50%;
    }

    .belt-label {
      text-align: center;
      margin-top: 4px;
      font-size: 0.85rem;
      color: #e5e7eb;
      font-weight: 600;
    }

    /* ============================
       BELT POSITIONS (STAIRCASE)
    ============================ */
    .belt1-wrapper {
      position: absolute;
      top: 150px;
      left: 80px;
      z-index: 3;
    }

    /* Belt 2 starts exactly where Belt 1 ends */
    .belt2-wrapper {
      position: absolute;
      top: 230px;              /* lower than belt 1 */
      left: calc(80px + 350px);/* belt1 left + belt1 width */
      z-index: 3;
    }

    .belt-step {
      position: absolute;
      left: calc(80px + 350px - 40px); /* under belt 1 end */
      top: 190px;
      width: 40px;
      height: 30px;
      background: #020617;
      border-radius: 0 0 10px 10px;
      z-index: 2;
    }

    /* ============================
       BOXES LAYER
    ============================ */
    .boxes-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4; /* boxes above belts */
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="sim-container">

    <!-- PILOT + THOUGHT BUBBLE -->
    <div class="pilot-wrapper">
      <!-- Replace this div with <img src="pilot.png" class="pilot"> when you have the image -->
      <div class="pilot"></div>
      <div class="thought-bubble">
        <ul id="needs-list">
          <li>I need 3 approaches</li>
          <li>I need 1 hold</li>
          <li>I need 1 intercept</li>
          <li>I need 1 track</li>
        </ul>
      </div>
    </div>

    <!-- FACTORY -->
    <div class="factory-area">
      <div class="chute">CHUTE</div>

      <!-- BELT 1 -->
      <div class="belt1-wrapper">
        <div class="belt" id="belt1">
          <div class="belt-rollers">
            <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
            <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
          </div>
        </div>
        <div class="belt-label">Current (0–6 months)</div>
      </div>

      <!-- STEP BETWEEN BELTS -->
      <div class="belt-step"></div>

      <!-- BELT 2 -->
      <div class="belt2-wrapper">
        <div class="belt" id="belt2">
          <div class="belt-rollers">
            <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
            <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
          </div>
        </div>
        <div class="belt-label">Not Current, but there is still time (7–12 months)</div>
      </div>

      <div class="boxes-layer" id="boxesLayer"></div>
    </div>

  </div>

</body>
</html>
