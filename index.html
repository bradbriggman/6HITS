<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Instrument Currency (61.57(c))</title>
  <style>
    /* ============= BASE LAYOUT ============= */
    body {
      font-family: system-ui, sans-serif;
      background: #0b1b33;
      color: #f5f5f5;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .panel {
      background: #122445;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 1100px;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 14px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: #1f6feb;
      color: #fff;
    }

    .log-options {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0b1730;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .counter button {
      padding: 2px 8px;
      font-size: 0.9rem;
    }

    .counter-value {
      min-width: 18px;
      text-align: center;
      font-weight: 700;
    }

    /* ============= SIM CONTAINER ============= */
    .sim-container {
      position: relative;
      width: 100%;
      max-width: 1100px;
      height: 400px;
      margin-top: 10px;
    }
    /* ============================ TOP BAR ============================ */
    .top-bar {
      width: 100%;
      max-width: 1100px;
      background: #122445;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* BEGIN BUTTON */
    .begin-btn {
      background: #22c55e;
      color: #fff;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
     font-size: 1.1rem;
    }

    /* LOGGING SECTION */
    .log-section {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .log-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .log-label {
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* COUNTERS */
    .counter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0b1730;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .counter button {
      padding: 2px 8px;
      font-size: 0.9rem;
      background: #1f6feb;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
    }

    .counter-value {
      min-width: 18px;
      text-align: center;
      font-weight: 700;
    }

    /* LOG BUTTON */
    .log-btn {
      background: #1f6feb;
      color: #fff;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
    }

    /* ============= PILOT + THOUGHT BUBBLE ============= */
    .pilot-wrapper {
      position: absolute;
      top: 5px;
      left: 390px;
      width: 200px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pilot-img {
      width: 160px;
    }

    .thought-bubble {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: #f9fafb;
      color: #111827;
      border-radius: 16px;
      padding: 10px 14px;
      max-width: 220px;
      font-size: 0.9rem;
      z-index: 5;
    }

    .thought-bubble::after {
      content: "";
      position: absolute;
      bottom: -20px;
      left: 30px;
      width: 10px;
      height: 10px;
      background: #f9fafb;
      border-radius: 50%;
    }

    .thought-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .thought-list {
      margin: 0;
      padding-left: 16px;
    }

    /* ============= FACTORY AREA ============= */
    .factory-area {
      margin-left: 220px;
      background: #0a162b;
      border-radius: 10px;
      padding: 16px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      min-height: 260px;
    }

    .chute {
      position: absolute;
      left: 40px;
      top: 30px;
      width: 80px;
      height: 80px;
      background: #1f2937;
      border-radius: 10px;
      border: 3px solid #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e7eb;
      font-weight: 700;
      font-size: 0.8rem;
      z-index: 3;
    }

    /* ============= BELTS ============= */
    .belt {
      position: relative;
      height: 60px;
      background: #111827;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #020617;
      box-shadow: 0 4px 0 #020617;
      z-index: 3;
   }

    .belt-rollers {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 16px;
      transform: translateY(-50%);
      display: flex;
      gap: 10px;
      padding: 0 8px;
    }

    .roller {
      flex: 0 0 20px;
      height: 16px;
      background: #374151;
      border-radius: 999px;
      box-shadow: inset 0 0 4px rgba(0,0,0,0.7);
    }

    .belt-label {
      text-align: center;
      margin-top: 4px;
      font-size: 0.85rem;
      color: #e5e7eb;
      font-weight: 600;
    }

    /* BELT 1 — now positioned precisely */
     .belt1-wrapper {
       position: absolute;
       top: 120px;
       left: 40px; /* where the belt actually begins */
       width: 350px; 
       z-index: 3;
    }

    /* BELT 2 — starts exactly where Belt 1 ends */
    .belt2-wrapper {
      position: absolute;
      top: 200px;
      left: calc(40px + 350px); /* belt1 left + belt1 width */
      width: 350px; 
      z-index: 3;
    }

    .belt-step {
      position: absolute;
      left: calc(80px + 350px - 40px); /* under belt 1 end */
      top: 160px;
      width: 40px;
      height: 30px;
      background: #020617;
      border-radius: 0 0 10px 10px;
      z-index: 2;
    }

    /* ============= BOXES + DUMPSTER ============= */
    .boxes-layer {
      position: absolute;
      left: 140px;
      right: 80px;
      top: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 4;
    }

    .box {
      position: absolute;
      min-width: 80px;
      padding: 4px 8px;
      height: 40px;
      background: #fbbf24;
      border-radius: 6px;
      border: 3px solid #92400e;
      box-shadow: 0 4px 0 #78350f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      font-weight: 700;
      font-size: 0.8rem;
      text-align: center;
      white-space: nowrap;
    }

    .dumpster {
      position: absolute;
      right: 10px;
      bottom: 20px;
      width: 80px;
      height: 60px;
      background: #14532d;
      border-radius: 8px 8px 4px 4px;
      border: 3px solid #022c22;
      box-shadow: 0 4px 0 #022c22;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      color: #bbf7d0;
      font-size: 0.75rem;
      font-weight: 700;
      text-align: center;
      padding-bottom: 4px;
      z-index: 3;
    }

    .ipc-banner {
      position: absolute;
      inset: 0;
      background: rgba(127,29,29,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fee2e2;
      font-weight: 800;
      font-size: 2rem;
      text-align: center;
      z-index: 20;
      display: none; /* placeholder */
    }
  </style>
</head>
<body>
  <h1>Instrument Currency (61.57(c))</h1>

  <!-- TOP PANEL: CONTROLS / LOGGING -->
  <div class="top-bar">

    <!-- BEGIN BUTTON -->
    <button id="beginBtn" class="begin-btn">Begin</button>

    <!-- LOGGING OPTIONS -->
    <div class="log-section">

        <div class="log-item">
            <span class="log-label">Approach</span>
            <div class="counter">
                <button class="minus" data-type="approach">-</button>
                <span class="counter-value" id="approachCount">0</span>
                <button class="plus" data-type="approach">+</button>
            </div>
        </div>

        <div class="log-item">
            <span class="log-label">Hold</span>
            <div class="counter">
                <button class="minus" data-type="hold">-</button>
                <span class="counter-value" id="holdCount">0</span>
                <button class="plus" data-type="hold">+</button>
            </div>
        </div>

        <div class="log-item">
            <span class="log-label">Intercept</span>
            <div class="counter">
                <button class="minus" data-type="intercept">-</button>
                <span class="counter-value" id="interceptCount">0</span>
                <button class="plus" data-type="intercept">+</button>
            </div>
        </div>

        <div class="log-item">
            <span class="log-label">Track</span>
            <div class="counter">
                <button class="minus" data-type="track">-</button>
                <span class="counter-value" id="trackCount">0</span>
                <button class="plus" data-type="track">+</button>
            </div>
        </div>

    </div>

    <!-- LOG BUTTON -->
    <button id="logBtn" class="log-btn">Log</button>

</div>

  <!-- MAIN SIMULATOR AREA -->
  <div class="panel">
    <div class="sim-container">

      <!-- PILOT + THOUGHT BUBBLE -->
      <div class="pilot-wrapper">
        <!-- Replace src with your pilot image -->
        <img src="pilot.png" class="pilot-img" alt="Pilot" />
        <div class="thought-bubble">
          <div class="thought-title">To Stay Current:</div>
          <ul class="thought-list">
            <li>6 Approaches</li>
            <li>1 Hold</li>
            <li>1 Intercept</li>
            <li>1 Track</li>
          </ul>
        </div>
      </div>

      <!-- FACTORY AREA -->
      <div class="factory-area">
        <div class="chute">CHUTE</div>

        <!-- BELT 1 -->
        <div class="belt1-wrapper">
          <div class="belt" id="belt1">
            <div class="belt-rollers">
              <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
              <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
            </div>
          </div>
          <div class="belt-label">Current (0–6 months)</div>
        </div>

        <!-- STEP BETWEEN BELTS -->
        <div class="belt-step"></div>

        <!-- BELT 2 -->
        <div class="belt2-wrapper">
          <div class="belt" id="belt2">
            <div class="belt-rollers">
              <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
              <div class="roller"></div><div class="roller"></div><div class="roller"></div><div class="roller"></div>
            </div>
          </div>
          <div class="belt-label">Not Current, but there is still time (7–12 months)</div>
        </div>

        <!-- BOXES LAYER (for future animation) -->
        <div class="boxes-layer" id="boxesLayer"></div>

        <!-- DUMPSTER -->
        <div class="dumpster">DUMPSTER</div>

        <!-- IPC BANNER PLACEHOLDER -->
        <div class="ipc-banner" id="ipcBanner">
          <div>IPC REQUIRED</div>
          <div style="font-size:1rem;margin-top:8px;">You are no longer instrument current.</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<script>
/* ============================
   COUNTER LOGIC
============================ */
const counters = {
  approach: 0,
  hold: 0,
  intercept: 0,
  track: 0
};

document.querySelectorAll(".plus").forEach(btn => {
  btn.addEventListener("click", () => {
    const type = btn.dataset.type;
    counters[type]++;
    document.getElementById(type + "Count").textContent = counters[type];
  });
});

document.querySelectorAll(".minus").forEach(btn => {
  btn.addEventListener("click", () => {
    const type = btn.dataset.type;
    if (counters[type] > 0) counters[type]--;
    document.getElementById(type + "Count").textContent = counters[type];
  });
});

/* ============================
   BELT MOVEMENT (BEGIN BUTTON)
============================ */
let beltsMoving = false;

document.getElementById("beginBtn").addEventListener("click", () => {
  if (beltsMoving) return;
  beltsMoving = true;

  document.querySelectorAll(".belt-rollers").forEach(rollers => {
    rollers.style.animation = "roll 0.3s linear infinite";
  });
});

/* Roller animation */
const style = document.createElement("style");
style.innerHTML = `
@keyframes roll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-28px); }
}`;
document.head.appendChild(style);

/* ============================
   LOG BUTTON → CREATE BOX
============================ */
document.getElementById("logBtn").addEventListener("click", () => {
  const label = buildLabel();
  if (!label) return;

  createBox(label);

  resetCounters();
});

/* Build label text from counters */
function buildLabel() {
  let parts = [];

  if (counters.approach > 0) parts.push(`${counters.approach}A`);
  if (counters.hold > 0) parts.push(`${counters.hold}H`);
  if (counters.intercept > 0) parts.push(`${counters.intercept}I`);
  if (counters.track > 0) parts.push(`${counters.track}T`);

  return parts.join(" ");
}

/* Reset counters after logging */
function resetCounters() {
  for (let key in counters) counters[key] = 0;

  document.getElementById("approachCount").textContent = 0;
  document.getElementById("holdCount").textContent = 0;
  document.getElementById("interceptCount").textContent = 0;
  document.getElementById("trackCount").textContent = 0;
}

/* ============================
   CREATE + MOVE BOX
============================ */
function createBox(label) {
  const box = document.createElement("div");
  box.className = "box";
  box.textContent = label;

  const layer = document.getElementById("boxesLayer");
  layer.appendChild(box);

  // Starting position on Belt 1
  let x = 0;
  let y = 120; // adjust if needed

  box.style.left = x + "px";
  box.style.top = y + "px";

  // Move 1 month every 3 seconds
  let months = 0;

  const interval = setInterval(() => {
    months++;
    x += 60; // move right

    box.style.left = x + "px";

    // Drop to Belt 2 at 6 months
    if (months === 6) {
      y += 80;
      box.style.top = y + "px";
    }

    // Dumpster at 12 months
    if (months === 12) {
      y += 120;
      box.style.top = y + "px";
      clearInterval(interval);
    }

  }, 3000);
}
</script>
